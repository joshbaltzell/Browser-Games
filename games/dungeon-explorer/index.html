<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #game-container {
      background: #1a1a2e;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    }

    canvas {
      display: block;
      border: 3px solid #00d4ff;
      background: #0f3460;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #hud {
      color: #00d4ff;
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
    }

    .hud-row {
      display: flex;
      justify-content: space-around;
      margin: 8px 0;
    }

    .hud-stat {
      flex: 1;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #00d4ff;
      border: none;
      border-radius: 5px;
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: background 0.3s;
    }

    button:hover {
      background: #00b8d4;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="500" height="500"></canvas>
    <div id="hud">
      <div class="hud-row">
        <div class="hud-stat">Floor: <span id="floor">1</span></div>
        <div class="hud-stat">Health: <span id="health">100</span></div>
        <div class="hud-stat">Score: <span id="score">0</span></div>
      </div>
      <button id="restart-btn" style="display: none;">New Game</button>
    </div>
  </div>
  <script type="module" src="./main.js"></script>
</body>
</html>
